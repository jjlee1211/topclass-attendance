<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>탑클래스 출결 — 교사 화면</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #1e1e2e;
    --accent: #4f9eff;
    --accent2: #7c5cfc;
    --warn: #ff6b6b;
    --text: #e8e8f0;
    --muted: #5a5a7a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* 배경 격자 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(79,158,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,158,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .header {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,15,0.8);
    backdrop-filter: blur(12px);
    z-index: 10;
  }

  .logo {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 0.1em;
  }

  .session-info {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .session-badge {
    font-size: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  .session-badge span {
    color: var(--text);
    font-weight: 500;
  }

  .checkin-count {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  .checkin-count b {
    color: var(--accent);
    font-size: 16px;
  }

  .main {
    display: flex;
    gap: 60px;
    align-items: center;
    padding: 100px 40px 40px;
  }

  /* QR 섹션 */
  .qr-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .qr-frame {
    position: relative;
    padding: 20px;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 0 60px rgba(79,158,255,0.15);
  }

  .qr-frame.expiring {
    box-shadow: 0 0 60px rgba(255,107,107,0.3);
  }

  .qr-frame.expiring::after {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 22px;
    background: linear-gradient(135deg, #ff6b6b, transparent, #ff6b6b);
    z-index: -1;
    animation: pulse 0.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  #qrcode canvas, #qrcode img {
    display: block;
    border-radius: 8px;
  }

  /* 타이머 링 */
  .timer-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .timer-ring {
    position: relative;
    width: 80px;
    height: 80px;
  }

  .timer-ring svg {
    transform: rotate(-90deg);
  }

  .timer-ring .bg {
    fill: none;
    stroke: var(--border);
    stroke-width: 4;
  }

  .timer-ring .progress {
    fill: none;
    stroke: var(--accent);
    stroke-width: 4;
    stroke-linecap: round;
    stroke-dasharray: 220;
    transition: stroke-dashoffset 0.9s linear, stroke 0.3s;
  }

  .timer-ring .progress.warn {
    stroke: var(--warn);
  }

  .timer-num {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    color: var(--text);
  }

  .timer-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* 우측 정보 */
  .info-section {
    display: flex;
    flex-direction: column;
    gap: 20px;
    min-width: 300px;
  }

  .info-title {
    font-size: 32px;
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: -0.02em;
  }

  .info-title .accent { color: var(--accent); }

  .info-desc {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.7;
    font-weight: 300;
  }

  .steps {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 8px;
  }

  .step-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }

  .step-num {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--accent);
    flex-shrink: 0;
    margin-top: 1px;
  }

  .step-text {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
  }

  .step-text strong { color: var(--text); font-weight: 500; }

  /* 체크인 목록 */
  .checkin-list {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    max-height: 200px;
    overflow-y: auto;
  }

  .checkin-list-title {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 10px;
    font-family: 'DM Mono', monospace;
  }

  .checkin-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    animation: fadeIn 0.3s ease;
  }

  .checkin-item:last-child { border-bottom: none; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .dot-green { width: 6px; height: 6px; border-radius: 50%; background: #4ade80; flex-shrink: 0; }
  .dot-orange { width: 6px; height: 6px; border-radius: 50%; background: #fb923c; flex-shrink: 0; }

  .ci-name { flex: 1; color: var(--text); }
  .ci-time { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
  .ci-tag { font-size: 10px; padding: 1px 6px; border-radius: 4px; }
  .ci-late { background: rgba(255,107,107,0.15); color: #ff6b6b; }
  .ci-ok { background: rgba(74,222,128,0.1); color: #4ade80; }

  .empty-msg {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    padding: 10px 0;
  }

  /* 하단 컨트롤 */
  .controls {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 16px 32px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-top: 1px solid var(--border);
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(12px);
  }

  .btn {
    padding: 10px 22px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: #3d8eff; }

  .btn-danger {
    background: rgba(255,107,107,0.15);
    color: var(--warn);
    border: 1px solid rgba(255,107,107,0.3);
  }
  .btn-danger:hover { background: rgba(255,107,107,0.25); }

  .btn-ghost {
    background: var(--surface);
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { color: var(--text); }

  .spacer { flex: 1; }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #4ade80;
    box-shadow: 0 0 8px #4ade80;
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .status-text {
    font-size: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  /* 갱신 플래시 */
  .flash {
    position: fixed;
    inset: 0;
    background: rgba(79,158,255,0.05);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.1s;
  }

  .flash.show { opacity: 1; }

  /* 세션 없을 때 */
  .no-session {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    padding: 40px;
  }

  .no-session-icon {
    font-size: 64px;
    opacity: 0.3;
  }

  .no-session h2 {
    font-size: 24px;
    font-weight: 500;
    color: var(--muted);
  }

  .session-id-display {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<div class="flash" id="flash"></div>

<div class="header">
  <div class="logo">TOPCLASS · ATTENDANCE</div>
  <div class="session-info">
    <div class="session-badge">세션 <span id="headerSessionCode">—</span></div>
    <div class="checkin-count">체크인 <b id="headerCount">0</b>명</div>
  </div>
</div>

<div class="main" id="mainContent" style="display:none">
  <div class="qr-section">
    <div class="qr-frame" id="qrFrame">
      <div id="qrcode"></div>
    </div>
    <div class="timer-wrap">
      <div class="timer-ring">
        <svg width="80" height="80" viewBox="0 0 80 80">
          <circle class="bg" cx="40" cy="40" r="35"/>
          <circle class="progress" id="timerArc" cx="40" cy="40" r="35"/>
        </svg>
        <div class="timer-num" id="timerNum">30</div>
      </div>
      <div class="timer-label">초 후 갱신</div>
    </div>
  </div>

  <div class="info-section">
    <div>
      <div class="info-title">QR을 <span class="accent">스캔</span>하면<br>체크인 완료</div>
      <div class="info-desc" style="margin-top:10px">30초마다 자동 갱신 — 캡처해서 공유해도 이미 만료</div>
    </div>

    <div class="steps">
      <div class="step-row">
        <div class="step-num">1</div>
        <div class="step-text"><strong>스마트폰 카메라</strong>로 QR코드 스캔</div>
      </div>
      <div class="step-row">
        <div class="step-num">2</div>
        <div class="step-text">열리는 화면에서 <strong>이름 선택</strong> 후 제출</div>
      </div>
      <div class="step-row">
        <div class="step-num">3</div>
        <div class="step-text">아래 목록에 <strong>실시간 반영</strong>됩니다</div>
      </div>
    </div>

    <div class="checkin-list">
      <div class="checkin-list-title">체크인 현황</div>
      <div id="checkinList">
        <div class="empty-msg">아직 체크인한 학생이 없습니다</div>
      </div>
    </div>
  </div>
</div>

<div class="no-session" id="noSession">
  <div class="no-session-icon">📋</div>
  <h2>세션을 시작해주세요</h2>
  <div style="font-size:13px;color:var(--muted)">하단의 [새 세션 시작] 버튼을 클릭하면<br>QR코드가 생성됩니다</div>
</div>

<div class="controls">
  <div class="status-dot" id="statusDot" style="background:#5a5a7a;box-shadow:none"></div>
  <div class="status-text" id="statusText">대기 중</div>
  <div class="spacer"></div>
  <button class="btn btn-ghost" onclick="exportData()">📊 기록 내보내기</button>
  <button class="btn btn-danger" id="endBtn" onclick="endSession()" style="display:none">세션 종료</button>
  <button class="btn btn-primary" id="startBtn" onclick="startSession()">새 세션 시작</button>
</div>

<script>
// ── 설정 ──────────────────────────────────────────
// ★ 여기에 Google Apps Script 웹앱 URL을 붙여넣으세요
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxU87LSReh0KuwaCdlfC4nespfsgfHG9B0nf6IkPpZRtSnhwQLhEM4G_9w3PZTkFb66/exec';

// 학생 체크인 페이지 URL (student.html이 올라간 주소)
const STUDENT_URL = location.href.replace('teacher.html', 'student.html');

// 공유 시크릿 (teacher/student 동일해야 함)
const SECRET = 'TOPCLASS2026';
const WINDOW = 30; // 초

// ── 상태 ──────────────────────────────────────────
let sessionCode = '';
let sessionStart = null;
let checkins = [];
let qrInstance = null;
let timerInterval = null;
let currentToken = '';

// ── TOTP 유사 토큰 생성 ──────────────────────────
function getToken(offset = 0) {
  const window = Math.floor(Date.now() / 1000 / WINDOW) + offset;
  const raw = SECRET + sessionCode + window;
  let hash = 0;
  for (let i = 0; i < raw.length; i++) {
    hash = ((hash << 5) - hash) + raw.charCodeAt(i);
    hash |= 0;
  }
  return Math.abs(hash).toString(36).toUpperCase().padStart(6, '0').slice(0, 6);
}

function getSecondsLeft() {
  return WINDOW - (Math.floor(Date.now() / 1000) % WINDOW);
}

// ── QR 생성 ──────────────────────────────────────
function buildCheckInURL(token) {
  const params = new URLSearchParams({
    session: sessionCode,
    token: token,
    t: Math.floor(Date.now() / 1000 / WINDOW)
  });
  return STUDENT_URL + '?' + params.toString();
}

function updateQR() {
  const newToken = getToken(0);
  if (newToken === currentToken) return;
  currentToken = newToken;

  const url = buildCheckInURL(newToken);

  if (qrInstance) {
    document.getElementById('qrcode').innerHTML = '';
    qrInstance = null;
  }

  qrInstance = new QRCode(document.getElementById('qrcode'), {
    text: url,
    width: 240,
    height: 240,
    colorDark: '#000000',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });

  // 플래시 효과
  const flash = document.getElementById('flash');
  flash.classList.add('show');
  setTimeout(() => flash.classList.remove('show'), 200);
}

// ── 타이머 ────────────────────────────────────────
function updateTimer() {
  const sec = getSecondsLeft();
  const num = document.getElementById('timerNum');
  const arc = document.getElementById('timerArc');
  const frame = document.getElementById('qrFrame');

  if (num) num.textContent = sec;

  const pct = sec / WINDOW;
  const circumference = 2 * Math.PI * 35;
  const offset = circumference * (1 - pct);
  if (arc) {
    arc.style.strokeDashoffset = offset;
    arc.classList.toggle('warn', sec <= 8);
  }
  if (frame) frame.classList.toggle('expiring', sec <= 8);

  // 토큰 갱신
  updateQR();
}

// ── 세션 ─────────────────────────────────────────
function startSession() {
  sessionCode = Math.floor(100000 + Math.random() * 900000).toString();
  sessionStart = new Date();
  checkins = [];

  document.getElementById('noSession').style.display = 'none';
  document.getElementById('mainContent').style.display = 'flex';
  document.getElementById('startBtn').style.display = 'none';
  document.getElementById('endBtn').style.display = 'inline-block';
  document.getElementById('headerSessionCode').textContent = sessionCode;
  document.getElementById('statusDot').style.cssText = 'width:8px;height:8px;border-radius:50%;background:#4ade80;box-shadow:0 0 8px #4ade80;animation:blink 2s ease-in-out infinite';
  document.getElementById('statusText').textContent = '세션 진행 중 · ' + sessionStart.toLocaleTimeString('ko-KR', {hour:'2-digit',minute:'2-digit'});

  updateTimer();
  timerInterval = setInterval(updateTimer, 1000);

  // 폴링으로 체크인 확인
  startPolling();
}

function endSession() {
  if (!confirm(`세션을 종료할까요?\n체크인 인원: ${checkins.length}명`)) return;

  clearInterval(timerInterval);
  stopPolling();

  document.getElementById('noSession').style.display = 'flex';
  document.getElementById('mainContent').style.display = 'none';
  document.getElementById('startBtn').style.display = 'inline-block';
  document.getElementById('endBtn').style.display = 'none';
  document.getElementById('statusDot').style.cssText = 'width:8px;height:8px;border-radius:50%;background:#5a5a7a;box-shadow:none';
  document.getElementById('statusText').textContent = `세션 종료 · ${checkins.length}명 참석`;
  document.getElementById('headerSessionCode').textContent = '—';

  sessionCode = '';
  currentToken = '';
}

// ── 체크인 목록 갱신 ─────────────────────────────
function addCheckin(name, time, isLate) {
  checkins.push({name, time, isLate});
  renderCheckinList();
  document.getElementById('headerCount').textContent = checkins.length;
}

function renderCheckinList() {
  const el = document.getElementById('checkinList');
  if (checkins.length === 0) {
    el.innerHTML = '<div class="empty-msg">아직 체크인한 학생이 없습니다</div>';
    return;
  }
  el.innerHTML = [...checkins].reverse().map(c => `
    <div class="checkin-item">
      <div class="${c.isLate ? 'dot-orange' : 'dot-green'}"></div>
      <div class="ci-name">${c.name}</div>
      <div class="ci-time">${c.time}</div>
      <div class="ci-tag ${c.isLate ? 'ci-late' : 'ci-ok'}">${c.isLate ? '지각' : '정시'}</div>
    </div>
  `).join('');
}

// ── 폴링 (체크인 감지) ───────────────────────────
let pollInterval = null;
const seenIds = new Set();

function startPolling() {
  if (GAS_URL === 'https://script.google.com/macros/s/AKfycbxU87LSReh0KuwaCdlfC4nespfsgfHG9B0nf6IkPpZRtSnhwQLhEM4G_9w3PZTkFb66/exec') return; // URL 미설정 시 스킵
  pollInterval = setInterval(async () => {
    try {
      const res = await fetch(`${GAS_URL}?action=getCheckins&session=${sessionCode}`);
      const data = await res.json();
      data.forEach(row => {
        if (!seenIds.has(row.id)) {
          seenIds.add(row.id);
          const elapsed = (new Date(row.time) - sessionStart) / 1000;
          addCheckin(row.name, new Date(row.time).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}), elapsed > 300);
        }
      });
    } catch(e) {}
  }, 3000);
}

function stopPolling() {
  clearInterval(pollInterval);
}

// ── 내보내기 ─────────────────────────────────────
function exportData() {
  if (checkins.length === 0) { alert('체크인 데이터가 없습니다.'); return; }
  const rows = [['이름','시간','지각여부'], ...checkins.map(c => [c.name, c.time, c.isLate ? '지각' : '정시'])];
  const csv = rows.map(r => r.join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `출결_${new Date().toLocaleDateString('ko-KR').replace(/\./g,'').replace(/ /g,'')}.csv`;
  a.click();
}

// ── 학생 직접 체크인 테스트용 (데모) ────────────
// 실제 사용 시 GAS_URL 설정하면 자동 폴링으로 대체됨
window.testCheckin = function(name) {
  const now = new Date();
  const elapsed = sessionStart ? (now - sessionStart) / 1000 : 0;
  addCheckin(name, now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}), elapsed > 300);
};
</script>
</body>
</html>
